<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Habits - Ultimate Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <style>
        /* --- THEME SETUP --- */
        :root {
            --bg-main: #191919;
            --bg-card: #202020;
            --border-color: #2a2a2a;
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0a0;
            --accent-blue: #3b82f6;
            --accent-cyan: #06b6d4;
            --accent-green: #22c55e;
            --accent-orange: #f97316;
            --accent-purple: #a855f7;
        }
        body { background-color: var(--bg-main); color: var(--text-primary); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }

        /* --- CUSTOM UI COMPONENTS --- */
        .notion-banner {
            height: 30vh; min-height: 250px; max-height: 400px; width: 100%; position: relative; overflow: hidden;
        }
        .notion-banner img { width: 100%; height: 100%; object-fit: cover; object-position: center 30%; opacity: 0.9; }
        .banner-fade { position: absolute; bottom: 0; left: 0; right: 0; height: 150px; background: linear-gradient(to top, var(--bg-main), transparent); }

        .main-container { max-width: 1200px; margin: 0 auto; padding: 0 2rem 4rem 2rem; position: relative; }
        
        .page-icon-header { font-size: 4.5rem; margin-top: -3.5rem; margin-bottom: 1rem; text-shadow: 0 2px 10px rgba(0,0,0,0.3); }

        .card { 
            background-color: var(--bg-card); border-radius: 12px; padding: 24px; 
            border: 1px solid var(--border-color); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3); border-color: #333; }

        /* Checkboxes & Inputs */
        .checkbox-custom { width: 18px; height: 18px; cursor: pointer; border-radius: 4px; border: 2px solid #444; appearance: none; position: relative; transition: 0.2s; }
        .checkbox-custom:checked { background-color: currentColor; border-color: transparent; }
        .checkbox-custom:checked::after { content: '✓'; position: absolute; color: black; font-size: 14px; top: -2px; left: 2px; font-weight: bold; }
        
        .editable-input { 
            background: transparent; border-bottom: 1px solid transparent; color: inherit; width: 100%; 
            padding: 4px 0; outline: none; transition: all 0.3s; font-size: 0.95rem;
        }
        .editable-input:hover { border-bottom-color: #444; }
        .editable-input:focus { border-bottom-color: var(--accent-blue); }

        .calendar-textarea {
            background: transparent; border: none; resize: none; outline: none; width: 100%; height: 100%; 
            color: var(--text-primary); font-size: 0.85rem; padding: 4px 0;
        }

        /* Buttons & Scrollbars */
        .btn-glass { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; }
        .btn-glass:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2); }
        
        .icon-btn-danger { cursor: pointer; opacity: 0.3; transition: 0.2s; color: inherit; }
        .icon-btn-danger:hover { opacity: 1; color: #ef4444; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>

    <div class="notion-banner">
        <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=2070&auto=format&fit=crop" alt="Banner Image">
        <div class="banner-fade"></div>
    </div>

    <div class="main-container">
        <div class="flex justify-between items-start mb-10">
            <div>
                <div class="page-icon-header">🧗</div>
                <h1 class="text-4xl font-extrabold mb-2 tracking-tight">My Habits & Goals</h1>
                <p class="text-secondary text-lg">Powered by Firebase Firestore 🔥</p>
            </div>
            
            <div class="mt-4 flex space-x-3">
                <button onclick="downloadData()" class="btn-glass text-sm px-4 py-2 rounded-lg flex items-center text-gray-300">
                    <i class="fas fa-cloud-download-alt mr-2"></i> Backup
                </button>
                <button onclick="resetData()" class="btn-glass text-sm px-4 py-2 rounded-lg flex items-center text-red-400 hover:text-red-300 border-red-900/30 hover:border-red-800/50 hover:bg-red-900/20">
                    <i class="fas fa-trash-restore mr-2"></i> Reset
                </button>
            </div>
        </div>

        <div class="card mb-12 overflow-hidden">
            <div class="flex justify-between items-center mb-6 px-2">
                <h2 class="text-2xl font-bold flex items-center">
                    <span class="bg-blue-500/20 text-blue-400 p-2 rounded-lg mr-3"><i class="fas fa-tasks"></i></span>
                    January Tracker
                </h2>
                <button onclick="addHabit()" class="text-blue-400 hover:text-blue-300 transition text-sm font-semibold flex items-center bg-blue-500/10 px-3 py-2 rounded-md hover:bg-blue-500/20">
                    <i class="fas fa-plus mr-2"></i> New Habit
                </button>
            </div>
            
            <div class="overflow-x-auto no-scrollbar pb-4">
                <table class="w-full text-center border-collapse px-2">
                    <thead>
                        <tr class="text-secondary text-xs uppercase tracking-wider">
                            <th class="text-left p-3 font-semibold min-w-[180px]">Habit Name</th>
                            <script>for(let i=1; i<=31; i++) document.write(`<th class="p-1 font-medium">${i}</th>`);</script>
                            <th class="p-3 text-blue-400 font-bold">%</th>
                            <th class="p-1 w-8"></th>
                        </tr>
                    </thead>
                    <tbody id="habitTableBody" class="divide-y divide-gray-800/50">
                    </tbody>
                </table>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-12">
            <div class="card flex flex-col items-center justify-center relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-cyan-500 to-blue-600"></div>
                <h3 class="absolute top-5 left-6 text-sm font-semibold text-secondary uppercase tracking-wider">Total Completion Rate</h3>
                <div class="relative w-48 h-48 mt-8">
                    <canvas id="donutChart"></canvas>
                    <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
                        <span id="donutLabel" class="text-4xl font-black text-cyan-400">0%</span>
                        <span class="text-xs text-secondary uppercase mt-1">All Time</span>
                    </div>
                </div>
            </div>

            <div class="card col-span-2 relative overflow-hidden">
                 <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-blue-600 to-cyan-500"></div>
                <h3 class="absolute top-5 left-6 text-sm font-semibold text-secondary uppercase tracking-wider">Daily Consistency Trend</h3>
                <div class="w-full h-72 mt-10">
                    <canvas id="lineChart"></canvas>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-12" id="goalsContainer">
        </div>

        <div class="card relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-purple-500 to-pink-500"></div>
            <div class="flex justify-between items-center mb-6 px-2">
                <h2 class="text-2xl font-bold flex items-center">
                    <span class="bg-purple-500/20 text-purple-400 p-2 rounded-lg mr-3"><i class="far fa-calendar-alt"></i></span>
                    Monthly Calendar & Events
                </h2>
            </div>
            
            <div class="grid grid-cols-2 sm:grid-cols-4 md:grid-cols-7 gap-3" id="calendarContainer">
                </div>
        </div>

    </div> 
    
    <script>
        // === CONFIG & THEMES ===
        const daysInMonth = 31;
        const goalThemes = {
            weekly: { title: 'Weekly Focus', icon: '🔥', border: 'border-green-500/30', bgAccent: 'bg-green-500/10', textAccent: 'text-green-400', accentColor: '#22c55e' },
            monthly: { title: 'Monthly Sprints', icon: '🚀', border: 'border-orange-500/30', bgAccent: 'bg-orange-500/10', textAccent: 'text-orange-400', accentColor: '#f97316' },
            annual: { title: 'Annual Vision', icon: '🏆', border: 'border-purple-500/30', bgAccent: 'bg-purple-500/10', textAccent: 'text-purple-400', accentColor: '#a855f7' }
        };

        // ==========================================
        // === FIREBASE CONFIGURATION ===
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyBVEOLHhOPZYs4q__c2KD_wm_kRkQBpr1o",
            authDomain: "mydashboard-1c9fa.firebaseapp.com",
            projectId: "mydashboard-1c9fa",
            storageBucket: "mydashboard-1c9fa.firebasestorage.app",
            messagingSenderId: "647097999320",
            appId: "1:647097999320:web:d778d885c7726ace89dcad",
            measurementId: "G-4XQVMD81EN"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const docRef = db.collection("dashboards").doc("main_tracker");

        let appData = { habits: [], habitChecks: {}, goals: { weekly: [], monthly: [], annual: [] }, calendar: {} };

        // Add a simple saving indicator to the UI
        document.body.insertAdjacentHTML('beforeend', `<div id="syncStatus" class="fixed bottom-4 right-4 bg-gray-800 text-gray-300 px-4 py-2 rounded-lg text-sm shadow-lg opacity-0 transition-opacity duration-300 z-50 flex items-center"><i class="fas fa-sync fa-spin mr-2"></i> Saving to Firebase...</div>`);

        function showSyncStatus(isSaving) {
            const el = document.getElementById('syncStatus');
            if (isSaving) {
                el.innerHTML = '<i class="fas fa-sync fa-spin mr-2 text-orange-400"></i> Saving...';
                el.classList.remove('opacity-0');
            } else {
                el.innerHTML = '<i class="fas fa-check text-green-400 mr-2"></i> Saved';
                setTimeout(() => el.classList.add('opacity-0'), 1500);
            }
        }

        async function fetchCloudData() {
            try {
                const docSnap = await docRef.get();
                if (docSnap.exists) {
                    appData = docSnap.data();
                    
                    // Safety checks for new features
                    if (!appData.calendar) appData.calendar = {};
                    if (!appData.goals) appData.goals = { weekly: [], monthly: [], annual: [] };
                    if (!appData.habits) appData.habits = [];
                    if (!appData.habitChecks) appData.habitChecks = {};
                } else {
                    // Document doesn't exist yet, push the empty default state
                    await save();
                }
            } catch (error) {
                console.error("Firebase Read Error:", error);
                alert("Error loading data from Firebase. Check console for details.");
            }
        }

        async function save() {
            showSyncStatus(true);
            updateCharts(); 
            
            try {
                // set() overrides the whole document. We merge: true just to be safe
                await docRef.set(appData, { merge: true });
                showSyncStatus(false);
            } catch (error) {
                console.error("Firebase Write Error:", error);
                alert("Error saving to Firebase. Check your Security Rules.");
            }
        }

        // === RENDERING ===
        function renderHabits() {
            const tbody = document.getElementById('habitTableBody');
            tbody.innerHTML = '';

            appData.habits.forEach((habit, index) => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-white/5 transition-colors";
                
                tr.innerHTML += `<td class="text-left p-3"><input type="text" class="editable-input" value="${habit.name}" onchange="updateHabitName(${index}, this.value)"></td>`;

                let count = 0;
                for (let d = 1; d <= daysInMonth; d++) {
                    const key = `${habit.id}-${d}`;
                    const isChecked = appData.habitChecks[key] || false;
                    if(isChecked) count++;
                    tr.innerHTML += `<td class="p-1"><input type="checkbox" class="checkbox-custom text-blue-500" ${isChecked ? 'checked' : ''} onchange="toggleHabit('${habit.id}', ${d}, this.checked)"></td>`;
                }

                const pct = Math.round((count/daysInMonth)*100);
                tr.innerHTML += `<td class="p-3 text-blue-400 font-bold text-sm">${pct}%</td>`;
                tr.innerHTML += `<td class="p-3"><i class="fas fa-times icon-btn-danger" onclick="deleteHabit(${index})"></i></td>`;
                tbody.appendChild(tr);
            });
        }

        function renderGoals() {
            const container = document.getElementById('goalsContainer');
            container.innerHTML = '';

            Object.keys(appData.goals).forEach(sectionKey => {
                const theme = goalThemes[sectionKey];
                if (!theme) return;

                const card = document.createElement('div');
                card.className = `card ${theme.border} relative overflow-hidden`;
                
                card.innerHTML = `
                    <div class="absolute top-0 left-0 w-full h-1 ${theme.bgAccent.replace('bg-', 'bg-gradient-to-r from-transparent to-')}"></div>
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="font-bold text-xl flex items-center ${theme.textAccent}">
                            <span class="mr-2">${theme.icon}</span> ${theme.title}
                        </h3> 
                        <button onclick="addGoal('${sectionKey}')" class="${theme.textAccent} hover:bg-white/10 p-2 rounded-md transition text-sm">
                            <i class="fas fa-plus"></i>
                        </button>
                    </div>
                    <div class="space-y-4" id="list-${sectionKey}"></div>
                `;

                const listContainer = card.querySelector(`#list-${sectionKey}`);
                appData.goals[sectionKey].forEach((goal, idx) => {
                    const div = document.createElement('div');
                    div.className = "flex items-center space-x-3 group";
                    div.innerHTML = `
                        <input type="checkbox" class="checkbox-custom" style="color: ${theme.accentColor}" ${goal.checked ? 'checked' : ''} onchange="toggleGoal('${sectionKey}', ${idx}, this.checked)">
                        <input type="text" class="editable-input ${goal.checked ? 'line-through text-secondary' : ''}" value="${goal.text}" onchange="updateGoalText('${sectionKey}', ${idx}, this.value)">
                        <i class="fas fa-times icon-btn-danger opacity-0 group-hover:opacity-50 text-sm" onclick="deleteGoal('${sectionKey}', ${idx})"></i>
                    `;
                    listContainer.appendChild(div);
                });
                container.appendChild(card);
            });
        }

        function renderCalendar() {
            const container = document.getElementById('calendarContainer');
            container.innerHTML = '';

            for (let d = 1; d <= daysInMonth; d++) {
                const div = document.createElement('div');
                const savedText = appData.calendar[d] || '';
                const hasEvent = savedText.trim().length > 0;
                
                const bgStyle = hasEvent ? 'bg-purple-500/20 border-purple-400' : 'bg-white/5 border-white/10';
                const textStyle = hasEvent ? 'text-purple-300' : 'text-secondary';
                
                div.className = `border rounded-lg p-3 min-h-[100px] flex flex-col hover:border-purple-500/50 transition duration-300 group ${bgStyle}`;
                
                div.innerHTML = `
                    <div class="flex justify-between items-center mb-2">
                        <span class="day-label text-xs font-bold group-hover:text-purple-400 transition-colors ${textStyle}">Day ${d}</span>
                    </div>
                    <textarea class="calendar-textarea no-scrollbar" placeholder="Add event..." oninput="handleCalendarInput(this, ${d})">${savedText}</textarea>
                `;
                container.appendChild(div);
            }
        }

        // === INTERACTIONS ===
        function toggleHabit(id, d, s) { s ? appData.habitChecks[`${id}-${d}`]=true : delete appData.habitChecks[`${id}-${d}`]; save(); renderHabits(); }
        function updateHabitName(i, v) { appData.habits[i].name = v; save(); }
        function addHabit() { appData.habits.push({id:'h'+Date.now(), name:'New Habit ⚡'}); save(); renderHabits(); }
        function deleteHabit(i) { if(confirm('Delete habit?')) { const id=appData.habits[i].id; appData.habits.splice(i,1); Object.keys(appData.habitChecks).forEach(k=>{if(k.startsWith(id))delete appData.habitChecks[k]}); save(); renderHabits(); }}

        function toggleGoal(s, i, st) { appData.goals[s][i].checked = st; save(); renderGoals(); }
        function updateGoalText(s, i, v) { appData.goals[s][i].text = v; save(); }
        function addGoal(s) { appData.goals[s].push({id:Date.now(), text:'New goal...', checked:false}); save(); renderGoals(); }
        function deleteGoal(s, i) { appData.goals[s].splice(i,1); save(); renderGoals(); }
        
        // Debounce timer for textarea typing so we don't spam Firebase writes
        let typingTimer;
        function handleCalendarInput(element, day) {
            const text = element.value;
            appData.calendar[day] = text;
            
            const box = element.parentElement;
            const label = box.querySelector('.day-label');
            
            if (text.trim().length > 0) {
                box.classList.remove('bg-white/5', 'border-white/10');
                box.classList.add('bg-purple-500/20', 'border-purple-400');
                label.classList.remove('text-secondary');
                label.classList.add('text-purple-300');
            } else {
                box.classList.add('bg-white/5', 'border-white/10');
                box.classList.remove('bg-purple-500/20', 'border-purple-400');
                label.classList.add('text-secondary');
                label.classList.remove('text-purple-300');
            }

            clearTimeout(typingTimer);
            typingTimer = setTimeout(() => { save(); }, 1000); // Save to Firebase 1s after user stops typing
        }

        function downloadData() { const b=new Blob([JSON.stringify(appData)],{type:"application/json"}); const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download="habits-firebase-backup.json"; a.click(); }
        
        async function resetData() { 
            if(confirm("Reset dashboard? All data will be permanently deleted from Firebase.")) { 
                appData = { habits: [], habitChecks: {}, goals: { weekly: [], monthly: [], annual: [] }, calendar: {} };
                await save();
                location.reload(); 
            }
        }

        // === CHARTS ===
        let donutChart, lineChart;
        const chartColors = { primary: '#06b6d4', secondary: '#3b82f6', bg: '#202020', grid: '#333' };

        function initCharts() {
            Chart.defaults.color = '#a0a0a0';
            Chart.defaults.font.family = '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif';

            const donutCtx = document.getElementById('donutChart').getContext('2d');
            let donutGrad = donutCtx.createLinearGradient(0, 0, 0, 200);
            donutGrad.addColorStop(0, chartColors.primary);
            donutGrad.addColorStop(1, chartColors.secondary);

            donutChart = new Chart(donutCtx, {
                type: 'doughnut',
                data: { labels: ['Done', 'Left'], datasets: [{ data: [0, 100], backgroundColor: [donutGrad, chartColors.bg], borderWidth: 0, cutout: '88%' }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, tooltip: { enabled: false } }, animation: { animateScale: true } }
            });

            const lineCtx = document.getElementById('lineChart').getContext('2d');
            let lineGrad = lineCtx.createLinearGradient(0, 0, 0, 300);
            lineGrad.addColorStop(0, 'rgba(6, 182, 212, 0.4)'); 
            lineGrad.addColorStop(1, 'rgba(6, 182, 212, 0.0)'); 

            lineChart = new Chart(lineCtx, {
                type: 'line',
                data: {
                    labels: Array.from({length: daysInMonth}, (_, i) => i + 1),
                    datasets: [{ 
                        label: 'Consistency', data: [], 
                        borderColor: chartColors.primary, 
                        backgroundColor: lineGrad, 
                        borderWidth: 3, tension: 0.4, fill: true, pointRadius: 0, pointHoverRadius: 6, pointBackgroundColor: chartColors.primary
                    }]
                },
                options: { 
                    responsive: true, maintainAspectRatio: false, 
                    scales: { y: { beginAtZero: true, max: 100, grid: { color: chartColors.grid, borderDash: [5, 5] } }, x: { display: false } }, 
                    plugins: { legend: { display: false } }, interaction: { intersect: false, mode: 'index' }
                }
            });
        }

        function updateCharts() {
            const dailyData = []; let totalChecks = 0;
            for(let d=1; d<=daysInMonth; d++) {
                let dayChecks = 0; appData.habits.forEach(h => { if(appData.habitChecks[`${h.id}-${d}`]) dayChecks++; });
                dailyData.push(appData.habits.length > 0 ? Math.round((dayChecks / appData.habits.length) * 100) : 0);
                totalChecks += dayChecks;
            }
            const totalPossible = appData.habits.length * daysInMonth;
            const totalPct = totalPossible > 0 ? Math.round((totalChecks / totalPossible) * 100) : 0;

            if(donutChart) { donutChart.data.datasets[0].data = [totalPct, 100 - totalPct]; donutChart.update(); }
            document.getElementById('donutLabel').innerText = totalPct + "%";
            if(lineChart) { lineChart.data.datasets[0].data = dailyData; lineChart.update(); }
        }

        // === INIT APP ===
        async function bootApp() {
            document.querySelector('.main-container').style.opacity = '0.3';
            
            await fetchCloudData(); 
            
            document.querySelector('.main-container').style.opacity = '1';
            
            initCharts();
            renderHabits();
            renderGoals();
            renderCalendar();
            updateCharts();
        }

        bootApp();

    </script>
</body>
</html>
